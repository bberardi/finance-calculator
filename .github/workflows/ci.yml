name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run check:lint

      - name: Check formatting
        run: npm run check:format

      - name: Test (with math-core coverage gate)
        # Runs the full suite and enforces the Math Correctness Charter's 100%
        # line+branch coverage threshold on src/helpers/** (configured in
        # vite.config.ts). Any PR dropping below it fails here.
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Bundle-size budget
        # Performance gate (roadmap 6.6): fails if the initial-load JS grows past
        # the budget, so a heavy import can't silently regress first paint. Runs
        # against the dist/ produced by the Build step above.
        run: npm run check:size

  e2e:
    name: E2E smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        # CI has open egress, so the Chromium download (blocked in the dev
        # sandbox) works here. Only Chromium is needed for the smoke test.
        run: npx playwright install --with-deps chromium

      - name: E2E smoke test (roadmap 6.2)
        # Playwright boots the Vite dev server itself (see playwright.config.ts)
        # and drives the add-positions → optimize → view-as-scenario path in a
        # real browser — the cross-layer wiring the unit suites can't see.
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
