<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PathWise — financial calculator and forecastor">
  <title>PathWise</title>
  <defs>
    <linearGradient id="pwEmblem" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3d2e"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="pwBars3" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0" stop-color="#00875a"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="pwLine3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#00c853"/>
      <stop offset="1" stop-color="#00e676"/>
    </linearGradient>
  </defs>

  <!-- Light, faintly green-tinted surface (theme light background.default) -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="#eef5f1"/>

  <!-- Emblem on its deep-green chip -->
  <g transform="translate(512,360) scale(1.06) translate(-256,-256)">
    <rect x="96" y="96" width="320" height="320" rx="86" fill="url(#pwEmblem)"/>
    <rect x="150" y="340" width="42" height="44"  rx="14" fill="url(#pwBars3)" opacity="0.92"/>
    <rect x="214" y="312" width="42" height="72"  rx="14" fill="url(#pwBars3)" opacity="0.96"/>
    <rect x="278" y="266" width="42" height="118" rx="14" fill="url(#pwBars3)"/>
    <rect x="342" y="192" width="42" height="192" rx="14" fill="url(#pwBars3)"/>
    <g stroke="url(#pwLine3)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M150 350 C 252 346, 356 228, 376 145"/>
    </g>
    <path d="M384 124 L395 156 L359 147 Z" fill="#00e676"/>
    <circle cx="150" cy="350" r="15" fill="#0b3d2e" stroke="#00e676" stroke-width="9"/>
  </g>

  <!-- Wordmark: dark forest + emerald on light -->
  <text x="512" y="760" text-anchor="middle"
        font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif"
        font-size="150" font-weight="700" letter-spacing="1"
        fill="#0b3d2e">Path<tspan fill="#00875a">Wise</tspan></text>

  <text x="512" y="838" text-anchor="middle"
        font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif"
        font-size="37" font-weight="400" letter-spacing="4"
        fill="#3f7a63">FINANCIAL CALCULATOR &amp; FORECASTOR</text>
</svg>
