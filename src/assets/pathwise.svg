<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PathWise — financial calculator and forecastor">
  <title>PathWise</title>
  <defs>
    <linearGradient id="pwBgCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3d2e"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="pwBars2" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0" stop-color="#00875a"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="pwLine2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#00c853"/>
      <stop offset="1" stop-color="#00e676"/>
    </linearGradient>
    <radialGradient id="pwGloss2" cx="0.32" cy="0.24" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="url(#pwBgCard)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="180" fill="url(#pwGloss2)"/>

  <!-- Emblem (same mark as the app icon), centered in the upper area -->
  <g transform="translate(512,360) scale(1.06) translate(-256,-256)">
    <rect x="96" y="96" width="320" height="320" rx="86" fill="#0e4434" stroke="#00e676" stroke-opacity="0.22" stroke-width="2"/>
    <rect x="150" y="300" width="42" height="84"  rx="14" fill="url(#pwBars2)" opacity="0.92"/>
    <rect x="214" y="252" width="42" height="132" rx="14" fill="url(#pwBars2)" opacity="0.96"/>
    <rect x="278" y="206" width="42" height="178" rx="14" fill="url(#pwBars2)"/>
    <rect x="342" y="160" width="42" height="224" rx="14" fill="url(#pwBars2)"/>
    <g stroke="url(#pwLine2)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M150 322 L213 268 L289 214 L372 150"/>
    </g>
    <path d="M330 150 L388 138 L376 196 Z" fill="#00e676"/>
    <circle cx="150" cy="322" r="15" fill="#0b3d2e" stroke="#00e676" stroke-width="9"/>
  </g>

  <!-- Wordmark -->
  <text x="512" y="760" text-anchor="middle"
        font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif"
        font-size="150" font-weight="700" letter-spacing="1"
        fill="#ffffff">Path<tspan fill="#00e676">Wise</tspan></text>

  <!-- Tagline -->
  <text x="512" y="838" text-anchor="middle"
        font-family="Liberation Sans, DejaVu Sans, Arial, sans-serif"
        font-size="37" font-weight="400" letter-spacing="4"
        fill="#9fe7c8">FINANCIAL CALCULATOR &amp; FORECASTOR</text>
</svg>
