<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  role="img"
  aria-label="PathWise logo"
>
  <title>PathWise</title>
  <defs>
    <linearGradient id="pw-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d4a37" />
      <stop offset="1" stop-color="#06291e" />
    </linearGradient>
    <linearGradient id="pw-bar" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#00a86b" />
      <stop offset="1" stop-color="#34e6a0" />
    </linearGradient>
  </defs>

  <!-- Dark-green rounded tile -->
  <rect width="512" height="512" rx="128" fill="url(#pw-bg)" />

  <!-- Ascending bars (the "net worth" growing) -->
  <g fill="url(#pw-bar)" opacity="0.55">
    <rect x="128" y="300" width="58" height="92" rx="16" />
    <rect x="214" y="252" width="58" height="140" rx="16" />
    <rect x="300" y="196" width="58" height="196" rx="16" />
  </g>

  <!-- Rising path + arrow (the "wise path" upward) -->
  <g
    fill="none"
    stroke="#6ef0b0"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <path d="M116 338 L200 268 L286 304 L392 158" />
    <path d="M344 158 H392 V206" />
  </g>

  <!-- Spark -->
  <circle cx="150" cy="178" r="11" fill="#b8f5d6" />
</svg>
