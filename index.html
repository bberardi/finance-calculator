<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PathWise — see all your loans and investments in one place</title>
    <meta
      name="description"
      content="Forecast your net worth across every loan and investment at once, and see where your next extra dollar does the most good — free, in your browser, with no account or tracking."
    />
    <meta name="theme-color" content="#0b3d2e" />
    <link
      rel="canonical"
      href="https://bberardi.github.io/finance-calculator/"
    />

    <!-- Favicon / app icons served from /public (roadmap 6.7). A modern SVG
         favicon with a 32px PNG fallback for older browsers, plus the
         apple-touch icon for iOS home screens. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph (roadmap 6.7): rich link previews on social / chat. Image
         URLs must be absolute for scrapers, so the production URL is used. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PathWise" />
    <meta
      property="og:title"
      content="PathWise — see all your loans and investments in one place"
    />
    <meta
      property="og:description"
      content="Forecast your net worth across every loan and investment at once, and see where your next extra dollar does the most good — free, in your browser, with no account or tracking."
    />
    <meta
      property="og:url"
      content="https://bberardi.github.io/finance-calculator/"
    />
    <meta
      property="og:image"
      content="https://bberardi.github.io/finance-calculator/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="PathWise — where should your next dollar go?"
    />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="PathWise — see all your loans and investments in one place"
    />
    <meta
      name="twitter:description"
      content="Forecast your net worth across every loan and investment at once, and see where your next extra dollar does the most good — free, in your browser, with no account or tracking."
    />
    <meta
      name="twitter:image"
      content="https://bberardi.github.io/finance-calculator/og-image.png"
    />
    <meta
      name="twitter:image:alt"
      content="PathWise — where should your next dollar go?"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
